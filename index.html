<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>파출 안내</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Montserrat:wght@500;600&display=swap');
:root{--gold:#B8952A;--ink:#1A1A18;--ink4:#A8A8A0;--line:#E8E8E0;--ivory:#FAFAF7;--white:#FFFFFF;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--ivory);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:60px;}
.topbar{width:100%;max-width:520px;padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between;}
.brand{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:600;letter-spacing:.28em;color:var(--gold);text-transform:uppercase;}
.page-title{width:100%;max-width:520px;padding:20px 24px 24px;text-align:center;}
.page-title h1{font-size:26px;font-weight:700;letter-spacing:.04em;}
.page-title p{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:500;letter-spacing:.24em;color:var(--ink4);margin-top:6px;}
.card{width:100%;max-width:520px;background:var(--white);border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.06);margin:0 24px;overflow:hidden;}
.section{padding:20px 20px 0;}
.section-title{font-size:11px;font-weight:600;letter-spacing:.14em;color:var(--gold);text-transform:uppercase;margin-bottom:12px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;}
.chip{padding:8px 16px;border:1.5px solid var(--line);border-radius:20px;background:var(--white);color:var(--ink4);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;}
.chip.active{border-color:var(--ink);background:var(--ink);color:var(--white);}
.row{display:flex;align-items:center;border-bottom:1px solid var(--line);min-height:52px;gap:12px;padding:0 0 0 0;}
.lbl{font-size:12px;color:var(--ink4);min-width:76px;flex-shrink:0;}
.inp{flex:1;border:none;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:500;color:var(--ink);outline:none;padding:14px 0;}
.inp::placeholder{color:#CCC;font-weight:400;}
input[type=date].inp{color:var(--ink);}
.divider{height:1px;background:var(--line);margin:0 20px;}
.photo-section{padding:20px;}
.photo-title{font-size:11px;font-weight:600;letter-spacing:.14em;color:var(--gold);text-transform:uppercase;margin-bottom:12px;}
.photo-box{width:100%;height:160px;border:2px dashed var(--line);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;overflow:hidden;position:relative;background:var(--ivory);}
.photo-box img{width:100%;height:100%;object-fit:cover;display:none;border-radius:10px;}
.photo-hint{font-size:13px;color:var(--ink4);}
.photo-clear{margin-top:8px;padding:6px 14px;border:1px solid var(--line);border-radius:16px;background:var(--white);font-size:12px;color:var(--ink4);cursor:pointer;display:none;}
.text-alt{font-size:11px;color:var(--ink4);margin:10px 0 6px;font-weight:500;}
.btn-main{width:calc(100% - 48px);max-width:472px;margin:20px 24px 0;padding:18px;border:none;border-radius:12px;background:var(--ink);color:var(--white);font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-main:active{opacity:.85;transform:scale(.99);}

/* 미리보기 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal-sheet{width:100%;max-width:520px;background:var(--white);border-radius:20px 20px 0 0;padding:12px 24px 48px;max-height:90vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 16px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title-txt{font-size:17px;font-weight:700;}
.modal-close{width:32px;height:32px;border:none;background:var(--line);border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.preview-img{width:100%;border-radius:10px;display:block;margin-bottom:16px;}
.btn-share{width:100%;padding:17px;border:none;border-radius:10px;background:#FEE500;color:#3A1D1D;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
.btn-save{width:100%;padding:15px;border:1.5px solid var(--gold);border-radius:10px;background:transparent;color:var(--gold);font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--white);font-size:13px;padding:10px 22px;border-radius:24px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:200;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">CHOI WOOYOUNG SEAFOOD</span>
</div>

<div class="page-title">
  <h1>파출 안내</h1>
  <p>DISPATCH INFORMATION</p>
</div>

<div class="card">
  <!-- 매장 -->
  <div class="section">
    <div class="section-title">매장 선택</div>
    <div class="chips" id="g_store">
      <button class="chip active" data-val="구로점"   onclick="pick('g_store',this)">구로점</button>
      <button class="chip"        data-val="여의도점" onclick="pick('g_store',this)">여의도점</button>
      <button class="chip"        data-val="가산점"   onclick="pick('g_store',this)">가산점</button>
      <button class="chip"        data-val="영등포점" onclick="pick('g_store',this)">영등포점</button>
      <button class="chip"        data-val="종로점"   onclick="pick('g_store',this)">종로점</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 날짜 -->
  <div class="section" style="padding-top:16px;">
    <div class="row" style="border-bottom:none;">
      <span class="lbl">날짜</span>
      <input type="date" class="inp" id="f_date">
    </div>
  </div>

  <div class="divider"></div>

  <!-- 시간 -->
  <div class="section" style="padding-top:16px;">
    <div class="section-title">근무 시간</div>
    <div class="chips" id="g_time">
      <button class="chip active" data-val="오전"   onclick="pick('g_time',this)">오전</button>
      <button class="chip"        data-val="오후"   onclick="pick('g_time',this)">오후</button>
      <button class="chip"        data-val="풀타임" onclick="pick('g_time',this)">풀타임</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 포지션 -->
  <div class="section" style="padding-top:16px;">
    <div class="section-title">포지션</div>
    <div class="chips" id="g_pos">
      <button class="chip active" data-val="홀"   onclick="pick('g_pos',this)">홀</button>
      <button class="chip"        data-val="주방" onclick="pick('g_pos',this)">주방</button>
      <button class="chip"        data-val="스끼" onclick="pick('g_pos',this)">스끼</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 직접 입력 -->
  <div class="section" style="padding-top:16px;padding-bottom:16px;">
    <div class="section-title">직접 입력</div>
    <div class="row"><span class="lbl">성함</span><input class="inp" id="f_name" placeholder="홍길동"></div>
    <div class="row"><span class="lbl">등록번호</span><input class="inp" id="f_reg" placeholder="123456-1234567" maxlength="14" oninput="fmtReg(this)"></div>
    <div class="row"><span class="lbl">은행명</span><input class="inp" id="f_bank" placeholder="국민은행"></div>
    <div class="row" style="border-bottom:none;"><span class="lbl">계좌번호</span><input class="inp" id="f_acct" placeholder="123-456-789012"></div>
  </div>

  <div class="divider"></div>

  <!-- 등록증 사진 -->
  <div class="photo-section">
    <div class="photo-title">등록증 사진</div>
    <div class="photo-box" id="box_reg" onclick="triggerPh('ph_reg')">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#CCC" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <span class="photo-hint">탭하여 사진 찍기</span>
      <img id="prev_reg">
    </div>
    <input type="file" id="ph_reg" accept="image/*" capture="environment" style="display:none" onchange="prevPh(this,'prev_reg','box_reg','clr_reg')">
    <button class="photo-clear" id="clr_reg" onclick="clearPh('ph_reg','prev_reg','box_reg','clr_reg')">✕ 삭제</button>
  </div>

  <div class="divider"></div>

  <!-- 계좌 사진 -->
  <div class="photo-section">
    <div class="photo-title">계좌 사진</div>
    <div class="photo-box" id="box_acct" onclick="triggerPh('ph_acct')">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#CCC" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <span class="photo-hint">탭하여 사진 찍기</span>
      <img id="prev_acct">
    </div>
    <input type="file" id="ph_acct" accept="image/*" capture="environment" style="display:none" onchange="prevPh(this,'prev_acct','box_acct','clr_acct')">
    <button class="photo-clear" id="clr_acct" onclick="clearPh('ph_acct','prev_acct','box_acct','clr_acct')">✕ 삭제</button>
  </div>
</div>

<button class="btn-main" onclick="buildAndPreview()">미리보기 · 공유</button>

<!-- 미리보기 모달 -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <span class="modal-title-txt">미리보기</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <img id="mergedImg" class="preview-img" src="">
    <button class="btn-share" onclick="doShare()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      카카오톡으로 보내기
    </button>
    <button class="btn-save" onclick="doSave()">📥 이미지 저장</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let _mergedFile = null;

function pick(gid, btn) {
  document.querySelectorAll('#'+gid+' .chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
}
function getChip(gid) {
  const a = document.querySelector('#'+gid+' .chip.active');
  return a ? a.dataset.val : '—';
}
function fmtReg(el) {
  let v = el.value.replace(/\D/g,'');
  if(v.length>6) v = v.slice(0,6)+'-'+v.slice(6,13);
  el.value = v;
}
function triggerPh(id){ document.getElementById(id).click(); }
function prevPh(input,prevId,boxId,clrId){
  const file = input.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = e => {
    const img = document.getElementById(prevId);
    img.src = e.target.result; img.style.display='block';
    const box = document.getElementById(boxId);
    box.querySelector('svg').style.display='none';
    box.querySelector('.photo-hint').style.display='none';
    box.style.border='2px solid var(--gold)';
    document.getElementById(clrId).style.display='inline-block';
  };
  r.readAsDataURL(file);
}
function clearPh(inputId,prevId,boxId,clrId){
  document.getElementById(inputId).value='';
  const img=document.getElementById(prevId); img.src=''; img.style.display='none';
  const box=document.getElementById(boxId);
  box.querySelector('svg').style.display=''; box.querySelector('.photo-hint').style.display='';
  box.style.border='2px dashed var(--line)';
  document.getElementById(clrId).style.display='none';
}
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

// ── 날짜 기본값 ──
window.addEventListener('DOMContentLoaded',()=>{
  const t=new Date();
  document.getElementById('f_date').value=
    t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
});

// ── 이미지 로드 ──
function loadImg(src){
  return new Promise((res,rej)=>{
    const img=new Image(); img.onload=()=>res(img); img.onerror=rej; img.src=src;
  });
}

// ── 파출 카드 그리기 ──
function drawDispatchCard(lines){
  const W=640, ROW=54, TOP=90, PAD=32;
  const H = TOP + lines.length*ROW + 40;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');

  // 배경
  ctx.fillStyle='#FFFFFF'; ctx.fillRect(0,0,W,H);
  // 상단 골드 바
  const g=ctx.createLinearGradient(0,0,W,0);
  g.addColorStop(0,'#B8952A'); g.addColorStop(.5,'#E0C060'); g.addColorStop(1,'#B8952A');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,6);
  // 제목
  ctx.fillStyle='#1A1A18'; ctx.font='bold 26px sans-serif';
  ctx.fillText('[최우영씨푸드 파출 안내]',PAD,52);
  // 구분선
  ctx.strokeStyle='#E8E8E0'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(PAD,68); ctx.lineTo(W-PAD,68); ctx.stroke();
  // 행
  lines.forEach((l,i)=>{
    const y = TOP + i*ROW + ROW/2 + 6;
    ctx.fillStyle='#A8A8A0'; ctx.font='16px sans-serif'; ctx.fillText(l.k, PAD, y);
    ctx.fillStyle='#1A1A18'; ctx.font='bold 18px sans-serif'; ctx.fillText(l.v, 200, y);
    if(i<lines.length-1){
      ctx.strokeStyle='#F0F0E8'; ctx.lineWidth=.8;
      ctx.beginPath(); ctx.moveTo(PAD,TOP+(i+1)*ROW); ctx.lineTo(W-PAD,TOP+(i+1)*ROW); ctx.stroke();
    }
  });
  // 하단 골드 바
  ctx.fillStyle=g; ctx.fillRect(0,H-4,W,4);
  return cv.toDataURL('image/png');
}

// ── 합성 ──
async function mergeImages(cardDataUrl, photoDataUrls){
  const W=640, GAP=12;
  const cardImg = await loadImg(cardDataUrl);
  const cardH = Math.round(cardImg.height*(W/cardImg.width));

  const photos=[];
  for(const url of photoDataUrls){
    const img=await loadImg(url);
    const h=Math.round(img.height*(W/img.width));
    photos.push({img,h});
  }

  let totalH=cardH;
  photos.forEach(p=>totalH+=GAP+p.h);

  const cv=document.createElement('canvas'); cv.width=W; cv.height=totalH;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#F5F5F0'; ctx.fillRect(0,0,W,totalH);
  ctx.drawImage(cardImg,0,0,W,cardH);
  let y=cardH;
  photos.forEach(p=>{ y+=GAP; ctx.drawImage(p.img,0,y,W,p.h); y+=p.h; });

  return new Promise((res,rej)=>{
    cv.toBlob(b=>{
      if(b) res(new File([b],'파출안내.jpg',{type:'image/jpeg'}));
      else rej(new Error('toBlob failed'));
    },'image/jpeg',.92);
  });
}

// ── 파일 → dataURL ──
function fileToDataUrl(file){
  return new Promise((res,rej)=>{
    const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsDataURL(file);
  });
}

// ── 미리보기 빌드 ──
async function buildAndPreview(){
  const dateRaw = document.getElementById('f_date').value;
  let dateStr='—';
  if(dateRaw){ const[y,m,d]=dateRaw.split('-'); dateStr=y+'년 '+m+'월 '+d+'일'; }

  const lines=[
    {k:'매장',   v:getChip('g_store')},
    {k:'날짜',   v:dateStr},
    {k:'시간',   v:getChip('g_time')},
    {k:'포지션', v:getChip('g_pos')},
    {k:'성함',   v:document.getElementById('f_name').value.trim()||'—'},
    {k:'등록번호',v:document.getElementById('f_reg').value.trim()||'—'},
    {k:'은행명', v:document.getElementById('f_bank').value.trim()||'—'},
    {k:'계좌번호',v:document.getElementById('f_acct').value.trim()||'—'},
  ];

  const cardUrl = drawDispatchCard(lines);

  // 사진 dataURL 수집 (모달 열기 전에 반드시)
  const photoUrls=[];
  const regFile  = document.getElementById('ph_reg').files[0];
  const acctFile = document.getElementById('ph_acct').files[0];
  if(regFile)  photoUrls.push(await fileToDataUrl(regFile));
  if(acctFile) photoUrls.push(await fileToDataUrl(acctFile));

  try {
    _mergedFile = await mergeImages(cardUrl, photoUrls);
  } catch(e) {
    showToast('이미지 합성 오류: '+e.message); return;
  }

  const url=URL.createObjectURL(_mergedFile);
  document.getElementById('mergedImg').src=url;
  document.getElementById('modal').classList.add('open');
}

// ── 공유 ──
async function doShare(){
  if(!_mergedFile){ showToast('이미지를 먼저 생성해주세요.'); return; }
  if(navigator.share && navigator.canShare && navigator.canShare({files:[_mergedFile]})){
    try{ await navigator.share({files:[_mergedFile], title:'파출 안내'}); return; }catch(e){ if(e.name==='AbortError') return; }
  }
  // 공유 불가 → 저장으로 안내
  doSave();
  showToast('저장 후 카카오톡으로 보내주세요.');
}

// ── 저장 ──
function doSave(){
  if(!_mergedFile){ showToast('이미지를 먼저 생성해주세요.'); return; }
  const url=URL.createObjectURL(_mergedFile);
  const a=document.createElement('a'); a.href=url; a.download='파출안내.jpg';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },1000);
  showToast('이미지가 저장됩니다.');
}
</script>
</body>
</html>
